<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pixel Battle Ultra Zoom</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0b0b0b; font-family: sans-serif; user-select: none; touch-action: none; }
        #game-container { width: 100vw; height: 100vh; position: relative; overflow: hidden; }
        #canvas {
            position: absolute; top: 0; left: 0;
            image-rendering: pixelated; background-color: white;
            transform-origin: 0 0;
        }
        #cursor-hint {
            position: absolute; pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-sizing: border-box; display: none; z-index: 5;
            box-shadow: 0 0 0 1px rgba(0,0,0,0.5);
        }
        #top-ui {
            position: fixed; top: 10px; left: 10px; right: 10px;
            display: flex; justify-content: space-between; pointer-events: none; z-index: 100;
        }
        .glass {
            background: rgba(0, 0, 0, 0.8); color: white; padding: 8px 12px;
            border-radius: 8px; font-family: monospace; font-size: 14px;
        }
        #bottom-ui {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.95); padding: 15px; border-radius: 25px;
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            z-index: 100; border: 1px solid rgba(255,255,255,0.1);
        }
        #palette { display: flex; gap: 8px; }
        .color-btn {
            width: 35px; height: 35px; border-radius: 10px; cursor: pointer;
            border: 2px solid transparent; transition: 0.2s;
        }
        .color-btn.active { border-color: white; transform: scale(1.2); }
        #timer { color: #888; font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="top-ui">
        <div class="glass" id="coords">X: 0, Y: 0</div>
        <div class="glass">Online: <span id="online-count">0</span></div>
    </div>

    <div id="game-container">
        <canvas id="canvas" width="5000" height="5000"></canvas>
        <div id="cursor-hint"></div>
    </div>
    
    <div id="bottom-ui">
        <div id="palette"></div>
        <div id="timer">Загрузка...</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const cursorHint = document.getElementById('cursor-hint');
        const timerEl = document.getElementById('timer');
        const paletteEl = document.getElementById('palette');

        const COOLDOWN_MS = 5000;
        let lastPlacedTime = 0;
        const colors = ['#000000','#FFFFFF','#E43333','#33E433','#3333E4','#F3E926','#FF8C00','#8B4513','#FF69B4','#7E2553'];
        let selectedColor = colors[2];

        let scale = 0.5; 
        let panX = window.innerWidth/2 - 2500 * 0.5;
        let panY = window.innerHeight/2 - 2500 * 0.5;
        let isDragging = false;
        let startX, startY;
        let hasMoved = false;
        let lastTouchDist = null;

        colors.forEach(color => {
            const btn = document.createElement('div');
            btn.className = 'color-btn';
            btn.style.backgroundColor = color;
            if(color === selectedColor) btn.classList.add('active');
            btn.onclick = () => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedColor = color;
            };
            paletteEl.appendChild(btn);
        });

        function updateTransform() {
            canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
            // Сетка появляется только при ОЧЕНЬ сильном зуме
            canvas.style.backgroundImage = scale > 15 ? 
                `linear-gradient(to right, rgba(0,0,0,0.2) 1px, transparent 1px), 
                 linear-gradient(to bottom, rgba(0,0,0,0.2) 1px, transparent 1px)` : 'none';
            canvas.style.backgroundSize = "1px 1px";
        }

        function getCoords(clientX, clientY) {
            return {
                x: Math.floor((clientX - panX) / scale),
                y: Math.floor((clientY - panY) / scale)
            };
        }

        socket.on('userCount', (count) => { document.getElementById('online-count').textContent = count; });
        socket.on('initBoard', (data) => {
            data.forEach(([key, color]) => {
                const [x, y] = key.split(',').map(Number);
                ctx.fillStyle = color;
                ctx.fillRect(x, y, 1, 1);
            });
            timerEl.textContent = "Готов!";
        });
        socket.on('updatePixel', (data) => {
            ctx.fillStyle = data.color;
            ctx.fillRect(data.x, data.y, 1, 1);
        });

        // УПРАВЛЕНИЕ ТАЧАМИ (ДЛЯ ТЕЛЕФОНА)
        window.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true; hasMoved = false;
                startX = e.touches[0].clientX - panX;
                startY = e.touches[0].clientY - panY;
            } else if (e.touches.length === 2) {
                isDragging = false;
                lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            }
        }, {passive: false});

        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (e.touches.length === 1 && isDragging) {
                hasMoved = true;
                panX = e.touches[0].clientX - startX;
                panY = e.touches[0].clientY - startY;
            } else if (e.touches.length === 2) {
                const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                const delta = dist / lastTouchDist;
                const newScale = Math.max(0.01, Math.min(scale * delta, 800)); // ЛИМИТ ЗУМА 800
                
                const midX = (e.touches[0].clientX + e.touches[1].clientX) / 2;
                const midY = (e.touches[0].clientY + e.touches[1].clientY) / 2;

                panX = midX - (midX - panX) * (newScale / scale);
                panY = midY - (midY - panY) * (newScale / scale);
                scale = newScale;
                lastTouchDist = dist;
            }
            
            const touch = e.touches[0];
            const c = getCoords(touch.clientX, touch.clientY);
            updateUI(c);
            updateTransform();
        }, {passive: false});

        window.addEventListener('touchend', (e) => {
            if (!hasMoved && !lastTouchDist) {
                const touch = e.changedTouches[0];
                const c = getCoords(touch.clientX, touch.clientY);
                placePixel(c);
            }
            isDragging = false; lastTouchDist = null;
        });

        // МЫШКА (ДЛЯ ПК)
        window.addEventListener('mousedown', (e) => {
            if(e.button === 0) { isDragging = true; hasMoved = false; startX = e.clientX - panX; startY = e.clientY - panY; }
        });
        window.addEventListener('mousemove', (e) => {
            const c = getCoords(e.clientX, e.clientY);
            updateUI(c);
            if (!isDragging) return;
            hasMoved = true; panX = e.clientX - startX; panY = e.clientY - startY;
            updateTransform();
        });
        window.addEventListener('mouseup', (e) => {
            if(!hasMoved && isDragging) { const c = getCoords(e.clientX, e.clientY); placePixel(c); }
            isDragging = false;
        });

        window.addEventListener('wheel', (e) => {
            e.preventDefault();
            const delta = e.deltaY > 0 ? 0.8 : 1.25;
            const newScale = Math.max(0.01, Math.min(scale * delta, 800));
            panX = e.clientX - (e.clientX - panX) * (newScale / scale);
            panY = e.clientY - (e.clientY - panY) * (newScale / scale);
            scale = newScale;
            updateTransform();
        }, {passive: false});

        function updateUI(c) {
            if(c.x >= 0 && c.x < 5000 && c.y >= 0 && c.y < 5000) {
                document.getElementById('coords').textContent = `X: ${c.x}, Y: ${c.y}`;
                if(scale > 5) {
                    cursorHint.style.display = 'block';
                    cursorHint.style.width = scale + 'px';
                    cursorHint.style.height = scale + 'px';
                    cursorHint.style.left = (c.x * scale + panX) + 'px';
                    cursorHint.style.top = (c.y * scale + panY) + 'px';
                }
            } else { cursorHint.style.display = 'none'; }
        }

        function placePixel(c) {
            if (Date.now() - lastPlacedTime < COOLDOWN_MS) return;
            if (c.x < 0 || c.x >= 5000 || c.y < 0 || c.y >= 5000) return;
            ctx.fillStyle = selectedColor;
            ctx.fillRect(c.x, c.y, 1, 1);
            socket.emit('drawPixel', { x: c.x, y: c.y, color: selectedColor });
            lastPlacedTime = Date.now();
        }

        setInterval(() => {
            const diff = Date.now() - lastPlacedTime;
            if (diff >= COOLDOWN_MS) { timerEl.textContent = "Можно рисовать"; timerEl.style.color = "#4ade80"; }
            else { timerEl.textContent = `Жди: ${Math.ceil((COOLDOWN_MS - diff)/1000)}с`; timerEl.style.color = "#f87171"; }
        }, 100);

        updateTransform();
    </script>
</body>
</html>
