<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Battle 2000x2000</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #121212; font-family: sans-serif; touch-action: none; user-select: none; }
        #game-container { width: 100vw; height: 100vh; position: relative; overflow: hidden; background: #000; }
        /* image-rendering: pixelated важен, чтобы при зуме пиксели были четкими квадратами */
        #canvas { position: absolute; top: 0; left: 0; image-rendering: pixelated; background-color: white; transform-origin: 0 0; }
        
        #top-ui { position: fixed; top: 15px; left: 15px; right: 15px; display: flex; justify-content: space-between; pointer-events: none; z-index: 100; }
        .glass { background: rgba(0, 0, 0, 0.8); color: white; padding: 10px; border-radius: 10px; font-family: monospace; font-size: 11px; border: 1px solid #333; pointer-events: auto; }
        
        #bottom-ui { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1a1a1a; padding: 10px; border-radius: 40px; display: flex; align-items: center; gap: 8px; z-index: 100; border: 1px solid #444; }
        .icon-btn { width: 40px; height: 40px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 1px solid #333; display: flex; align-items: center; justify-content: center; font-size: 18px; color: white; cursor: pointer; }
        
        #palette-toggle { background: linear-gradient(45deg, red, orange, yellow, green, blue, purple); border: 2px solid white; }
        #timer { color: #aaa; font-size: 12px; font-weight: bold; width: 60px; text-align: center; }
        #active-color-preview { width: 25px; height: 25px; border-radius: 5px; border: 1px solid #555; }

        #full-palette-popup { position: fixed; bottom: -100%; left: 0; right: 0; height: 50vh; background: #111; border-top: 2px solid #444; border-radius: 20px 20px 0 0; z-index: 200; transition: 0.3s; padding: 15px; overflow-y: auto; }
        #full-palette-popup.open { bottom: 0; }
        #palette-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(30px, 1fr)); gap: 5px; }
        .color-btn { aspect-ratio: 1; border-radius: 4px; cursor: pointer; }

        #chat-container { position: fixed; left: 15px; bottom: 80px; width: 200px; max-height: 150px; overflow: hidden; pointer-events: none; display: flex; flex-direction: column-reverse; gap: 4px; }
        .chat-msg { background: rgba(0, 0, 0, 0.7); color: white; padding: 5px 10px; border-radius: 8px; font-size: 11px; animation: fadeOut 5s forwards; }
        #chat-input { background: #333; color: #fff; border: 1px solid #555; padding: 8px; border-radius: 20px; outline: none; width: 120px; pointer-events: auto; }
        @keyframes fadeOut { 0% { opacity: 1; } 80% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

<div id="top-ui">
    <div class="glass" id="coords">X: 0, Y: 0</div>
    <div class="glass">Онлайн: <span id="online-count">0</span></div>
</div>

<div id="game-container">
    <canvas id="canvas" width="2000" height="2000"></canvas>
</div>

<div id="chat-container"></div>

<div id="bottom-ui">
    <div id="palette-toggle" class="icon-btn"></div>
    <input type="text" id="chat-input" placeholder="Чат..." maxlength="50">
    <div id="active-color-preview"></div>
    <div id="timer">ГОТОВ</div>
</div>

<div id="full-palette-popup">
    <div style="display:flex; justify-content:space-between; color:white; margin-bottom:15px;">
        <b>Выбери цвет</b>
        <span id="close-palette" style="cursor:pointer; font-size:20px;">✕</span>
    </div>
    <div id="palette-grid"></div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let scale = 0.5; // Начинаем с чуть меньшего зума, так как поле большое
    let panX = 0, panY = 0;
    let selectedColor = '#ff0000';
    let lastDrawTime = 0;

    // Палитра (500 цветов)
    const grid = document.getElementById('palette-grid');
    for(let i=0; i<500; i++) {
        const color = `hsl(${(i * 360 / 500)}, 70%, 50%)`;
        const div = document.createElement('div');
        div.className = 'color-btn';
        div.style.backgroundColor = color;
        div.onclick = () => {
            selectedColor = color;
            document.getElementById('active-color-preview').style.backgroundColor = color;
            document.getElementById('full-palette-popup').classList.remove('open');
        };
        grid.appendChild(div);
    }
    document.getElementById('active-color-preview').style.backgroundColor = selectedColor;

    document.getElementById('palette-toggle').onclick = () => document.getElementById('full-palette-popup').classList.add('open');
    document.getElementById('close-palette').onclick = () => document.getElementById('full-palette-popup').classList.remove('open');

    // Отрисовка
    socket.on('initBoard', (board) => {
        for (const key in board) {
            const [x, y] = key.split(',');
            ctx.fillStyle = board[key];
            ctx.fillRect(x, y, 1, 1);
        }
    });

    socket.on('updatePixel', (data) => {
        ctx.fillStyle = data.color;
        ctx.fillRect(data.x, data.y, 1, 1);
    });

    let isDragging = false, lastX, lastY;

    window.onmousedown = (e) => {
        if(e.target.closest('#bottom-ui') || e.target.closest('#full-palette-popup')) return;
        
        isDragging = true;
        lastX = e.clientX;
        lastY = e.clientY;

        const coords = getCoords(e);
        const now = Date.now();
        if (now - lastDrawTime > 3000) {
            ctx.fillStyle = selectedColor;
            ctx.fillRect(coords.x, coords.y, 1, 1);
            socket.emit('drawPixel', { x: coords.x, y: coords.y, color: selectedColor });
            lastDrawTime = now;
        }
    };

    window.onmousemove = (e) => {
        const coords = getCoords(e);
        document.getElementById('coords').innerText = `X: ${coords.x}, Y: ${coords.y}`;

        if (isDragging) {
            panX += e.clientX - lastX;
            panY += e.clientY - lastY;
            lastX = e.clientX;
            lastY = e.clientY;
            updateTransform();
        }
    };

    window.onmouseup = () => isDragging = false;
    window.onwheel = (e) => {
        scale *= e.deltaY > 0 ? 0.9 : 1.1;
        updateTransform();
    };

    function getCoords(e) {
        const rect = canvas.getBoundingClientRect();
        // ТЕПЕРЬ ДЕЛИМ НА (ширина / 2000), так как пикселей стало в 2 раза больше
        const x = Math.floor((e.clientX - rect.left) / (rect.width / 2000));
        const y = Math.floor((e.clientY - rect.top) / (rect.height / 2000));
        return { x, y };
    }

    function updateTransform() {
        canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
    }

    setInterval(() => {
        const remaining = Math.ceil((3000 - (Date.now() - lastDrawTime)) / 1000);
        const timerEl = document.getElementById('timer');
        if (remaining <= 0) {
            timerEl.innerText = "ГОТОВ";
            timerEl.style.color = "lime";
        } else {
            timerEl.innerText = remaining + "s";
            timerEl.style.color = "red";
        }
    }, 100);

    // Чат
    document.getElementById('chat-input').onkeypress = (e) => {
        if(e.key === 'Enter' && e.target.value.trim()) {
            socket.emit('sendMessage', { text: e.target.value });
            e.target.value = '';
        }
    };
    socket.on('receiveMessage', (data) => {
        const div = document.createElement('div');
        div.className = 'chat-msg';
        div.innerText = `${data.id.slice(0,4)}: ${data.text}`;
        document.getElementById('chat-container').prepend(div);
    });
    socket.on('userCount', (count) => document.getElementById('online-count').innerText = count);

    updateTransform();
</script>
</body>
</html>
