<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Battle 5000x5000</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #1a1a1a; font-family: 'Segoe UI', sans-serif; user-select: none; }
        
        #game-container { 
            width: 100vw; height: 100vh; 
            position: relative; overflow: hidden; 
            background: #252525;
            touch-action: none;
        }
        
        #canvas {
            position: absolute;
            top: 0; left: 0;
            image-rendering: pixelated;
            background-color: white;
            box-shadow: 0 0 100px rgba(0,0,0,0.5);
            /* Сетка через CSS, которая масштабируется вместе с холстом */
            background-image: 
                linear-gradient(to right, rgba(0,0,0,0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0,0,0,0.05) 1px, transparent 1px);
            background-size: 1px 1px;
        }

        /* Верхняя панель */
        #top-bar {
            position: fixed; top: 15px; left: 15px; right: 15px;
            display: flex; justify-content: space-between;
            pointer-events: none; z-index: 100;
        }
        .glass-box {
            background: rgba(0, 0, 0, 0.75); color: white;
            padding: 10px 18px; border-radius: 12px; font-family: monospace;
            backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #online-count { color: #4ade80; font-weight: bold; }

        /* Нижний интерфейс */
        #bottom-ui {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(20, 20, 20, 0.9); padding: 15px; border-radius: 24px;
            display: flex; flex-direction: column; align-items: center; gap: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6); z-index: 100;
            border: 1px solid rgba(255,255,255,0.05);
        }

        /* Палитра */
        #palette { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .color-btn {
            width: 38px; height: 38px; border-radius: 10px; cursor: pointer;
            border: 2px solid rgba(255,255,255,0.1); transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .color-btn:hover { transform: translateY(-3px); }
        .color-btn.active { border-color: white; transform: scale(1.15); box-shadow: 0 0 15px rgba(255,255,255,0.3); }

        #timer { color: #ccc; font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div id="top-bar">
        <div class="glass-box" id="coords">X: 0, Y: 0</div>
        <div class="glass-box">Online: <span id="online-count">0</span></div>
    </div>

    <div id="game-container">
        <canvas id="canvas" width="5000" height="5000"></canvas>
    </div>
    
    <div id="bottom-ui">
        <div id="palette"></div>
        <div id="timer">Загрузка...</div>
    </div>

    <script src="/socket.io/socket.io.js"></script>

    <script>
        const socket = io();
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const timerEl = document.getElementById('timer');
        const onlineEl = document.getElementById('online-count');
        const paletteEl = document.getElementById('palette');
        const coordsEl = document.getElementById('coords');
        const container = document.getElementById('game-container');

        // Настройки
        const COOLDOWN_MS = 10000;
        let lastPlacedTime = 0;
        const colors = [
            '#000000', '#FFFFFF', '#E43333', '#33E433', '#3333E4', 
            '#F3E926', '#FF8C00', '#8B4513', '#FF69B4', '#808080'
        ];
        let selectedColor = colors[2];

        // Камера
        let scale = 1.5; 
        let panX = window.innerWidth / 2 - 2500 * scale;
        let panY = window.innerHeight / 2 - 2500 * scale;
        let isDragging = false;
        let startX, startY;
        let hasMoved = false;

        // Создаем кнопки выбора цвета
        colors.forEach(color => {
            const btn = document.createElement('div');
            btn.className = 'color-btn';
            btn.style.backgroundColor = color;
            if(color === selectedColor) btn.classList.add('active');
            btn.onclick = () => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedColor = color;
            };
            paletteEl.appendChild(btn);
        });

        // СЕТЬ
        socket.on('userCount', (count) => { onlineEl.textContent = count; });
        socket.on('initBoard', (pixelData) => {
            pixelData.forEach(([key, color]) => {
                const [x, y] = key.split(',').map(Number);
                ctx.fillStyle = color;
                ctx.fillRect(x, y, 1, 1);
            });
            timerEl.textContent = "Готов!";
        });
        socket.on('updatePixel', (data) => {
            ctx.fillStyle = data.color;
            ctx.fillRect(data.x, data.y, 1, 1);
        });

        // ЛОГИКА КАМЕРЫ И РИСОВАНИЯ
        function updateTransform() {
            canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
            canvas.style.transformOrigin = '0 0';
            // Сетка видна только если масштаб больше 8
            canvas.style.backgroundImage = scale > 8 ? 
                `linear-gradient(to right, rgba(0,0,0,0.15) 1px, transparent 1px), 
                 linear-gradient(to bottom, rgba(0,0,0,0.15) 1px, transparent 1px)` : 'none';
        }

        function getCanvasCoords(clientX, clientY) {
            const x = Math.floor((clientX - panX) / scale);
            const y = Math.floor((clientY - panY) / scale);
            return { x, y };
        }

        function placePixel(e) {
            const clientX = e.clientX || (e.changedTouches && e.changedTouches[0].clientX);
            const clientY = e.clientY || (e.changedTouches && e.changedTouches[0].clientY);
            const coords = getCanvasCoords(clientX, clientY);

            if(coords.x < 0 || coords.x >= 5000 || coords.y < 0 || coords.y >= 5000) return;
            if (Date.now() - lastPlacedTime < COOLDOWN_MS) return;

            ctx.fillStyle = selectedColor;
            ctx.fillRect(coords.x, coords.y, 1, 1);
            socket.emit('drawPixel', { x: coords.x, y: coords.y, color: selectedColor });
            lastPlacedTime = Date.now();
        }

        // Таймер
        setInterval(() => {
            const diff = Date.now() - lastPlacedTime;
            if (diff >= COOLDOWN_MS) {
                timerEl.textContent = "Можно рисовать";
                timerEl.style.color = "#4ade80";
            } else {
                timerEl.textContent = `Кулдаун: ${Math.ceil((COOLDOWN_MS - diff) / 1000)}с`;
                timerEl.style.color = "#f87171";
            }
        }, 100);

        // События
        const onStart = (e) => {
            isDragging = true; hasMoved = false;
            startX = (e.clientX || e.touches[0].clientX) - panX;
            startY = (e.clientY || e.touches[0].clientY) - panY;
        };

        const onMove = (e) => {
            const clientX = e.clientX || e.touches[0].clientX;
            const clientY = e.clientY || e.touches[0].clientY;
            const c = getCanvasCoords(clientX, clientY);
            if(c.x >= 0 && c.x < 5000 && c.y >= 0 && c.y < 5000) {
                coordsEl.textContent = `X: ${c.x}, Y: ${c.y}`;
            }
            if (!isDragging) return;
            hasMoved = true;
            panX = clientX - startX;
            panY = clientY - startY;
            updateTransform();
        };

        const onEnd = (e) => {
            isDragging = false;
            if (!hasMoved) placePixel(e);
        };

        container.addEventListener('mousedown', onStart);
        window.addEventListener('mousemove', onMove);
        window.addEventListener('mouseup', onEnd);
        container.addEventListener('touchstart', onStart, {passive: false});
        window.addEventListener('touchmove', onMove, {passive: false});
        window.addEventListener('touchend', onEnd);

        window.addEventListener('wheel', (e) => {
            const delta = e.deltaY > 0 ? 0.8 : 1.2;
            const newScale = Math.max(0.1, Math.min(scale * delta, 60));
            panX = e.clientX - (e.clientX - panX) * (newScale / scale);
            panY = e.clientY - (e.clientY - panY) * (newScale / scale);
            scale = newScale;
            updateTransform();
        }, {passive: false});

        updateTransform();
    </script>
</body>
</html>
